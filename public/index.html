<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DT App</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#e31e24">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#f0f0f0;font-family:'Segoe UI',sans-serif}
:root{--rojo:#e31e24;--gris:#1a1a1a;--gris2:#2a2a2a}
.header{background:#111;border-bottom:3px solid var(--rojo);padding:16px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:900;letter-spacing:2px;color:#fff}
.header p{font-size:10px;color:var(--rojo);font-weight:600;letter-spacing:1px}
.sdot{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.son{background:#1a3a1a;color:#4caf50}
.soff{background:#3a1a1a;color:#e31e24}
.nav{display:flex;background:#111;border-bottom:1px solid #222;overflow-x:auto}
.nav button{flex:1;min-width:70px;padding:13px 6px;background:none;border:none;color:#666;font-size:12px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent}
.nav button.active{color:var(--rojo);border-bottom-color:var(--rojo)}
.page{display:none;padding:16px;max-width:600px;margin:0 auto}
.page.active{display:block}
.btn{padding:10px 18px;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px}
.br{background:var(--rojo);color:#fff}
.bg{background:var(--gris2);color:#fff}
.bp{background:#1a0000;color:#e31e24;border:1px solid #e31e24}
.card{background:var(--gris);border:1px solid #222;border-radius:12px;padding:14px;margin-bottom:10px}
.card.vencido{border-color:#e31e24}
.card.proximo{border-color:#ff9800}
.avatar{width:42px;height:42px;border-radius:50%;background:var(--rojo);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#fff;flex-shrink:0}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;margin-right:4px}
.ba{background:#1a3a1a;color:#4caf50}
.bp2{background:#2a2a2a;color:#888}
.bal{background:#1a3a1a;color:#4caf50}
.bpr{background:#3a2a00;color:#ff9800}
.bv{background:#3a0000;color:#e31e24}
.bti{background:#1a1a2a;color:#7986cb}
.ig{margin-bottom:13px}
.ig label{display:block;font-size:11px;color:#888;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.ig input,.ig select,.ig textarea{width:100%;background:#111;border:1px solid #333;border-radius:8px;padding:11px;color:#f0f0f0;font-size:14px;outline:none}
.ig input:focus,.ig select:focus,.ig textarea:focus{border-color:var(--rojo)}
.ig textarea{min-height:80px;resize:vertical}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:flex-end}
.modal.open{display:flex}
.mc{background:#111;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-height:92vh;overflow-y:auto;border-top:3px solid var(--rojo)}
.mt{font-size:17px;font-weight:800;color:#fff;margin-bottom:18px}
.dtab{display:flex;overflow-x:auto;gap:8px;margin-bottom:14px;padding-bottom:4px}
.dtab button{flex-shrink:0;padding:7px 13px;border-radius:20px;border:1px solid #333;background:#1a1a1a;color:#777;font-size:12px;font-weight:600;cursor:pointer}
.dtab button.active{background:var(--rojo);color:#fff;border-color:var(--rojo)}
.li{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #1a1a1a;font-size:13px}
.lok{color:#4caf50;font-weight:700}
.ler{color:#e31e24;font-weight:700}
.fi{display:flex;justify-content:space-between;align-items:center;padding:11px;background:#1a1a1a;border-radius:8px;margin-bottom:8px}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#333;border-radius:24px;cursor:pointer;transition:.3s}
.slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#888;border-radius:50%;transition:.3s}
input:checked+.slider{background:var(--rojo)}
input:checked+.slider:before{transform:translateX(20px);background:#fff}
.fab{position:fixed;bottom:24px;right:20px;width:54px;height:54px;border-radius:50%;background:var(--rojo);border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(227,30,36,.4);z-index:50;display:flex;align-items:center;justify-content:center}
.st{font-size:11px;color:#666;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;display:none;border-left:4px solid #4caf50;white-space:nowrap}
.toast.show{display:block}
.es{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.eb{padding:7px 14px;border-radius:20px;border:2px solid transparent;font-size:12px;font-weight:700;cursor:pointer;background:#1a1a1a;color:#888}
.eb.sal{background:#1a3a1a;color:#4caf50;border-color:#4caf50}
.eb.spr{background:#3a2a00;color:#ff9800;border-color:#ff9800}
.eb.sve{background:#3a0000;color:#e31e24;border-color:#e31e24}
.sec-title{font-size:10px;color:#e31e24;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin:12px 0 8px}
</style>
</head>
<body>
<div class="header">
<img src="logo.svg" style="width:42px;height:42px;border-radius:8px">
<div style="flex:1">
<h1>DANNY TRAINER</h1>
<p>ASISTENTE DE ENTRENAMIENTO</p>
</div>
<span class="sdot soff" id="statusWA">⚫ Offline</span>
</div>
<div class="nav">
<button class="active" onclick="showPage('clientes')">👥 Clientes</button>
<button onclick="showPage('rutinas')">📋 Rutinas</button>
<button onclick="showPage('festivos')">🗓️ Festivos</button>
<button onclick="showPage('logs')">📊 Historial</button>
<button onclick="showPage('enviar')">📤 Enviar</button>
</div>
<div id="page-clientes" class="page active">
<input type="text" id="buscador-clientes" placeholder="🔍 Buscar cliente..." oninput="filtrarClientes()" style="width:100%;background:#111;border:1px solid #333;border-radius:8px;padding:11px;color:#f0f0f0;font-size:14px;outline:none;margin-bottom:12px"><p class="st">Clientes registrados</p>
<div id="lista-clientes"></div>
<div id="empty-clientes" style="display:none;text-align:center;padding:40px;color:#444">
<p style="font-size:40px">👥</p>
<p style="margin-top:10px">No hay clientes. Toca + para agregar.</p>
</div>
</div>
<div id="page-rutinas" class="page">
<input type="text" id="buscador-rutinas" placeholder="🔍 Buscar cliente..." oninput="filtrarRutinas()" style="width:100%;background:#111;border:1px solid #333;border-radius:8px;padding:11px;color:#f0f0f0;font-size:14px;outline:none;margin-bottom:12px"><p class="st">Selecciona un cliente</p>
<div id="lista-rutinas-clientes"></div>
</div>
<div id="page-festivos" class="page">
<p class="st">Días sin envío automático</p>
<div id="lista-festivos"></div>
<div style="margin-top:16px" class="card">
<div class="ig"><label>Fecha</label><input type="date" id="festivo-fecha"></div>
<div class="ig"><label>Nombre del día</label><input type="text" id="festivo-nombre" placeholder="Ej: Día del trabajo"></div>
<button class="btn br" style="width:100%" onclick="agregarFestivo()">➕ Agregar festivo</button>
</div>
</div>
<div id="page-logs" class="page">
<p class="st">Historial de envíos</p>
<div id="lista-logs"></div>
</div>
<div id="page-enviar" class="page">
<p class="st">Envío manual</p>
<div class="card">
<div class="ig"><label>Cliente</label><select id="enviar-cliente"></select></div>
<button class="btn br" style="width:100%" onclick="enviarRutinaCompleta()">💪 Enviar rutina completa</button>
</div>
<div class="card" style="margin-top:8px">
<div class="ig"><label>Cliente</label><select id="enviar-cliente-dia"></select></div>
<div class="ig"><label>Día</label>
<select id="enviar-dia-select" style="width:100%;background:#111;border:1px solid #333;border-radius:8px;padding:11px;color:#f0f0f0;font-size:14px;outline:none">
<option value="lunes">Lunes</option>
<option value="martes">Martes</option>
<option value="miercoles">Miércoles</option>
<option value="jueves">Jueves</option>
<option value="viernes">Viernes</option>
<option value="sabado">Sábado</option>
<option value="domingo">Domingo</option>
</select></div>
<button class="btn br" style="width:100%" onclick="enviarDiaRutina()">📤 Enviar día de rutina</button>
</div>
<div class="card" style="margin-top:8px">
<div class="ig"><label>Enviar mensaje a</label><select id="enviar-cliente2"></select></div>
<div class="ig"><label>Mensaje</label><textarea id="mensaje-custom" placeholder="Escribe el mensaje personalizado..."></textarea></div>
<button class="btn br" style="width:100%" onclick="enviarMensajeCustom()">📤 Enviar mensaje</button>
</div>
</div>
<button class="fab" onclick="abrirModalCliente()" id="fab-btn">+</button>

<!-- MODAL CLIENTE -->
<div class="modal" id="modal-cliente">
<div class="mc">
<div class="mt" id="modal-titulo">➕ Nuevo cliente</div>
<input type="hidden" id="cliente-id">
<div class="ig"><label>Nombre</label><input type="text" id="cliente-nombre" placeholder="Nombre del cliente"></div>
<div class="ig"><label>Teléfono (código país + número)</label><input type="tel" id="cliente-telefono" placeholder="Ej: 573001234567"></div>
<div class="ig"><label>Tipo de cliente</label>
<select id="cliente-tipo">
<option value="asesorado">Asesorado (recibe rutina)</option>
<option value="personalizado">Personalizado (recibe cita)</option>
</select></div>
<div class="ig"><label>Hora de envío diario</label><input type="time" id="cliente-hora" value="07:00"></div>
<div class="ig"><label>Tipo de pago</label>
<select id="cliente-tipo-pago" onchange="togglePago2()">
<option value="mensual">Mensual (1 fecha)</option>
<option value="quincenal">Quincenal (2 fechas)</option>
</select></div>
<div class="ig"><label>Día de pago 1</label><input type="number" id="cliente-pago" placeholder="Ej: 1" min="1" max="31"></div>
<div class="ig" id="pago2-box" style="display:none"><label>Día de pago 2</label><input type="number" id="cliente-pago2" placeholder="Ej: 15" min="1" max="31"></div>
<div class="ig"><label>Estado de pago</label>
<div class="es">
<button class="eb sal" id="btn-aldia" onclick="selEstado('aldia')">✅ Al día</button>
<button class="eb" id="btn-proximo" onclick="selEstado('proximo')">⚠️ Pago próximo</button>
<button class="eb" id="btn-vencido" onclick="selEstado('vencido')">🔴 Vencido</button>
</div>
<input type="hidden" id="cliente-estado-pago" value="aldia">
</div>
<div class="ig" id="msg-mensual-box"><label>Mensaje recordatorio de pago</label><textarea id="cliente-msg-pago" placeholder="Ej: Hola, habla Daniel. Mañana es tu fecha de pago 🙌" style="min-height:60px"></textarea></div>
<div class="ig" id="msg-quincena1-box" style="display:none"><label>Mensaje primera quincena</label><textarea id="cliente-msg-q1" placeholder="Ej: Hola, mañana es tu primera quincena 👋" style="min-height:60px"></textarea></div>
<div class="ig" id="msg-quincena2-box" style="display:none"><label>Mensaje segunda quincena</label><textarea id="cliente-msg-q2" placeholder="Ej: Hola, mañana vence tu segunda quincena 🙌" style="min-height:60px"></textarea></div>
<div style="display:flex;gap:8px;margin-top:8px">
<button class="btn bg" style="flex:1" onclick="cerrarModal()">Cancelar</button>
<button class="btn br" style="flex:1" onclick="guardarCliente()">Guardar</button>
</div>
</div>
</div>

<!-- MODAL RUTINA -->
<div class="modal" id="modal-rutina">
<div class="mc">
<div class="mt" id="rutina-titulo">📋 Rutina</div>
<input type="hidden" id="rutina-cliente-id">
<div class="dtab" id="dias-tabs"></div>
<div id="rutina-form"></div>
<div style="display:flex;gap:8px;margin-top:14px">
<button class="btn bg" style="flex:1" onclick="cerrarModalRutina()">Cancelar</button>
<button class="btn br" style="flex:1" onclick="guardarRutina()">Guardar rutina</button>
</div>
</div>
</div>

<!-- MODAL MEDIDAS -->
<div class="modal" id="modal-medidas">
<div class="mc" style="padding-bottom:40px">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
<div class="mt" id="modal-medidas-titulo">📊 Medidas</div>
<button class="btn bg" style="padding:6px 14px" onclick="document.getElementById('modal-medidas').classList.remove('open')">✕</button>
</div>
<div style="display:flex;gap:6px;margin-bottom:16px">
<button id="mtab-perfil" class="btn bg" style="flex:1;font-size:12px" onclick="showMTabLoad('perfil',window.clienteMedidasId)">👤 Perfil</button>
<button id="mtab-peso" class="btn br" style="flex:1;font-size:12px" onclick="showMTabLoad('peso',window.clienteMedidasId)">⚖️ Peso</button>
<button id="mtab-medidas" class="btn bg" style="flex:1;font-size:12px" onclick="showMTabLoad('medidas',window.clienteMedidasId)">📏 Medidas</button>
<button id="mtab-analisis" class="btn bg" style="flex:1;font-size:12px" onclick="showMTabLoad('analisis',window.clienteMedidasId)">📊 Análisis</button>
</div>
<div id="msec-perfil" style="display:none"></div>
<div id="msec-peso"></div>
<div id="msec-medidas" style="display:none"></div>
<div id="msec-analisis" style="display:none"></div>
</div>
</div>

<!-- MODAL HISTORIAL -->
<div class="modal" id="modal-historial">
<div class="mc">
<div id="historial-contenido"></div>
<button class="btn bg" style="width:100%;margin-top:16px" onclick="document.getElementById('modal-historial').classList.remove('open')">Cerrar</button>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const DIAS=['lunes','martes','miercoles','jueves','viernes','sabado','domingo'];
let rutinaActual={},diaSeleccionado='lunes';

function showPage(p){
document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));
document.getElementById('page-'+p).classList.add('active');
document.querySelectorAll('.nav button')[['clientes','rutinas','festivos','logs','enviar'].indexOf(p)].classList.add('active');
document.getElementById('fab-btn').style.display=p==='clientes'?'flex':'none';
if(p==='clientes')cargarClientes();
if(p==='rutinas')cargarRutinasClientes();
if(p==='festivos')cargarFestivos();
if(p==='logs')cargarLogs();
if(p==='enviar')cargarSelectEnviar();
}

function toast(msg,ok=true){
const t=document.getElementById('toast');
t.textContent=msg;
t.style.borderLeftColor=ok?'#4caf50':'#e31e24';
t.classList.add('show');
setTimeout(()=>t.classList.remove('show'),2500);
}

function togglePago2(){
const t=document.getElementById('cliente-tipo-pago').value;
document.getElementById('pago2-box').style.display=t==='quincenal'?'block':'none';
}

function epBadge(ep){
if(ep==='vencido')return '<span class="badge bv">🔴 Vencido</span>';
if(ep==='proximo')return '<span class="badge bpr">⚠️ Pago próximo</span>';
return '<span class="badge bal">✅ Al día</span>';
}

async function cargarClientes(){
const res=await fetch('/api/usuarios');
const usuarios=await res.json();
const lista=document.getElementById('lista-clientes');
const empty=document.getElementById('empty-clientes');
if(!usuarios.length){lista.innerHTML='';empty.style.display='block';return;}
empty.style.display='none';
lista.innerHTML=usuarios.map(u=>{
const ep=u.estado_pago||'aldia';
const cc=ep==='vencido'?'card vencido':ep==='proximo'?'card proximo':'card';
return`<div class="${cc}">
<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
<div class="avatar">${u.nombre[0].toUpperCase()}</div>
<div style="flex:1">
<div style="font-size:16px;font-weight:700;color:#fff">${u.nombre}</div>
<div style="font-size:11px;color:#777;margin-top:2px">📱 ${u.telefono} &nbsp;⏰ ${u.hora_envio} &nbsp;🗓️ Día ${u.dia_pago||'-'}</div>
</div>
<label class="toggle"><input type="checkbox" ${u.activo?'checked':''} onchange="toggleActivo('${u.id}',this.checked)"><span class="slider"></span></label>
</div>
<div style="margin-bottom:10px">
<span class="badge ${u.activo?'ba':'bp2'}">${u.activo?'● Activo':'⏸ Pausado'}</span>
<span class="badge bti">${u.tipo}</span>
${epBadge(ep)}
</div>
<div style="display:flex;gap:6px">
<button class="btn bg" style="flex:1;font-size:12px" onclick="editarCliente('${u.id}')">✏️ Editar</button>
<button class="btn bg" style="flex:1;font-size:12px" onclick="abrirMedidas('${u.id}','${u.nombre}')">📊 Medidas</button>
<button class="btn bp" style="font-size:12px;padding:10px 12px" onclick="eliminarCliente('${u.id}')">🗑️</button>
</div>
</div>`;
}).join('');
}

function selEstado(e){
document.getElementById('cliente-estado-pago').value=e;
['aldia','proximo','vencido'].forEach(x=>{
const b=document.getElementById('btn-'+x);
b.className='eb'+(x===e?' s'+x.slice(0,2):'');
if(x==='aldia'&&e==='aldia')b.className='eb sal';
if(x==='proximo'&&e==='proximo')b.className='eb spr';
if(x==='vencido'&&e==='vencido')b.className='eb sve';
});
}

function abrirModalCliente(){
document.getElementById('cliente-id').value='';
document.getElementById('cliente-nombre').value='';
document.getElementById('cliente-telefono').value='';
document.getElementById('cliente-hora').value='07:00';
document.getElementById('cliente-pago').value='';
document.getElementById('cliente-pago2').value='';
document.getElementById('cliente-tipo-pago').value='mensual';
document.getElementById('pago2-box').style.display='none';
selEstado('aldia');
document.getElementById('modal-titulo').textContent='➕ Nuevo cliente';
document.getElementById('modal-cliente').classList.add('open');
}

async function editarCliente(id){
const res=await fetch('/api/usuarios');
const usuarios=await res.json();
const u=usuarios.find(x=>x.id===id);
document.getElementById('cliente-id').value=u.id;
document.getElementById('cliente-nombre').value=u.nombre;
document.getElementById('cliente-telefono').value=u.telefono;
document.getElementById('cliente-tipo').value=u.tipo;
document.getElementById('cliente-hora').value=u.hora_envio;
document.getElementById('cliente-pago').value=u.dia_pago||'';
document.getElementById('cliente-pago2').value=u.dia_pago2||'';
document.getElementById('cliente-tipo-pago').value=u.tipo_pago||'mensual';
document.getElementById('pago2-box').style.display=(u.tipo_pago==='quincenal')?'block':'none';
document.getElementById('cliente-msg-pago').value=u.msg_pago||'';
document.getElementById('cliente-msg-q1').value=u.msg_q1||'';
document.getElementById('cliente-msg-q2').value=u.msg_q2||'';
document.getElementById('msg-mensual-box').style.display=(u.tipo_pago==='quincenal')?'none':'block';
document.getElementById('msg-quincena1-box').style.display=(u.tipo_pago==='quincenal')?'block':'none';
document.getElementById('msg-quincena2-box').style.display=(u.tipo_pago==='quincenal')?'block':'none';
selEstado(u.estado_pago||'aldia');
document.getElementById('modal-titulo').textContent='✏️ Editar cliente';
document.getElementById('modal-cliente').classList.add('open');
}

function cerrarModal(){document.getElementById('modal-cliente').classList.remove('open');}

async function guardarCliente(){
const id=document.getElementById('cliente-id').value;
const datos={
nombre:document.getElementById('cliente-nombre').value.trim(),
telefono:document.getElementById('cliente-telefono').value.trim(),
tipo:document.getElementById('cliente-tipo').value,
hora_envio:document.getElementById('cliente-hora').value,
tipo_pago:document.getElementById('cliente-tipo-pago').value,
dia_pago:parseInt(document.getElementById('cliente-pago').value)||null,
dia_pago2:parseInt(document.getElementById('cliente-pago2').value)||null,
estado_pago:document.getElementById('cliente-estado-pago').value
};
if(!datos.nombre||!datos.telefono){toast('Completa nombre y teléfono',false);return;}
if(id){
await fetch('/api/usuarios/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(datos)});
toast('✅ Cliente actualizado');
}else{
await fetch('/api/usuarios',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(datos)});
toast('✅ Cliente agregado');
}
cerrarModal();cargarClientes();
}

async function eliminarCliente(id){
if(!confirm('¿Eliminar este cliente?'))return;
await fetch('/api/usuarios/'+id,{method:'DELETE'});
toast('🗑️ Cliente eliminado');cargarClientes();
}

async function toggleActivo(id,activo){
await fetch('/api/usuarios/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({activo})});
toast(activo?'✅ Activado':'⏸️ Pausado');cargarClientes();
}

async function cargarRutinasClientes(){
const res=await fetch('/api/usuarios');
const usuarios=await res.json();
document.getElementById('lista-rutinas-clientes').innerHTML=usuarios.map(u=>`
<div class="card" onclick="abrirRutina('${u.id}','${u.nombre}')" style="cursor:pointer">
<div style="display:flex;align-items:center;gap:12px">
<div class="avatar">${u.nombre[0].toUpperCase()}</div>
<div style="flex:1"><div style="font-weight:700">${u.nombre}</div>
<div style="font-size:12px;color:#777">Toca para editar rutina</div></div>
<span style="color:#e31e24;font-size:22px">›</span>
</div></div>`).join('');
}

async function abrirRutina(id,nombre){
document.getElementById('rutina-cliente-id').value=id;
document.getElementById('rutina-titulo').textContent='📋 '+nombre;
const res=await fetch('/api/rutinas/'+id);
rutinaActual=await res.json();
diaSeleccionado='lunes';
renderDiasTabs();renderRutinaForm();
document.getElementById('modal-rutina').classList.add('open');
}

function renderDiasTabs(){
document.getElementById('dias-tabs').innerHTML=DIAS.map(d=>
`<button class="${d===diaSeleccionado?'active':''}" onclick="seleccionarDia('${d}')">${d.charAt(0).toUpperCase()+d.slice(1)}</button>`
).join('');
}

function seleccionarDia(dia){
const rec=document.getElementById('rec-'+diaSeleccionado);
const rut=document.getElementById('rut-'+diaSeleccionado);
if(rec)rutinaActual[diaSeleccionado]={recordatorio:rec.value,rutina:rut.value};
diaSeleccionado=dia;renderDiasTabs();renderRutinaForm();
}

function renderRutinaForm(){
const d=rutinaActual[diaSeleccionado]||{recordatorio:'',rutina:'',ejercicios:[]};
const ejs=d.ejercicios||[];
let h='';
ejs.forEach((e,i)=>{h+=`<div style="background:#0a0a0a;border:1px solid #222;border-radius:8px;padding:10px;margin-bottom:6px"><div style="display:flex;gap:6px;margin-bottom:6px"><input type="text" value="${e.nombre||''}" placeholder="Ejercicio" id="ej-${i}-n" style="flex:1;background:#111;border:1px solid #333;border-radius:6px;padding:8px;color:#fff;font-size:13px;outline:none"><button onclick="eliminarEjercicio(${i})" style="background:#3a0000;color:#e31e24;border:1px solid #e31e24;border-radius:6px;padding:6px 10px;cursor:pointer">🗑️</button></div><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px">${[['series','S','4'],['reps','Reps','8-10'],['rir','RIR','1-2'],['desc','DESC','60s'],['var','VAR','V1']].map(([f,label,ph])=>`<div><div style="font-size:9px;color:#555;text-align:center;margin-bottom:2px">${label}</div><input type="text" id="ej-${i}-${f}" value="${e[f]||''}" placeholder="${ph}" style="width:100%;background:#111;border:1px solid #333;border-radius:6px;padding:6px;color:#fff;font-size:12px;text-align:center;outline:none"></div>`).join('')}</div></div>`;});
document.getElementById('rutina-form').innerHTML=`<div class="ig"><label>💬 Recordatorio</label><textarea id="rec-${diaSeleccionado}" placeholder="Escribe el recordatorio...">${d.recordatorio||''}</textarea></div><div style="font-size:10px;color:#e31e24;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin:10px 0 8px">📋 Ejercicios</div><div id="lista-ejs">${h}</div><button onclick="agregarEjercicio()" style="width:100%;background:#1a1a1a;color:#e31e24;border:1px solid #e31e24;border-radius:8px;padding:10px;font-weight:700;font-size:13px;cursor:pointer;margin-top:4px">➕ Agregar ejercicio</button><div class="ig" style="margin-top:10px"><label>📝 Notas</label><textarea id="rut-${diaSeleccionado}" placeholder="Notas adicionales...">${d.rutina||''}</textarea></div>`;}

function guardarEjsActuales(){
const dia=diaSeleccionado;
if(!rutinaActual[dia])rutinaActual[dia]={recordatorio:'',rutina:'',ejercicios:[]};
const recEl=document.getElementById('rec-'+dia);
const rutEl=document.getElementById('rut-'+dia);
if(recEl)rutinaActual[dia].recordatorio=recEl.value;
if(rutEl)rutinaActual[dia].rutina=rutEl.value;
const lista=document.getElementById('lista-ejs');
if(!lista)return;
const n=lista.querySelectorAll('[id$="-n"]').length;
const ejs=[];
for(let i=0;i<n;i++){
ejs.push({
nombre:document.getElementById('ej-'+i+'-n')?.value||'',
series:document.getElementById('ej-'+i+'-series')?.value||'',
reps:document.getElementById('ej-'+i+'-reps')?.value||'',
rir:document.getElementById('ej-'+i+'-rir')?.value||'',
desc:document.getElementById('ej-'+i+'-desc')?.value||'',
var:document.getElementById('ej-'+i+'-var')?.value||''
});
}
rutinaActual[dia].ejercicios=ejs;
}

function agregarEjercicio(){
guardarEjsActuales();
const dia=diaSeleccionado;
if(!rutinaActual[dia].ejercicios)rutinaActual[dia].ejercicios=[];
rutinaActual[dia].ejercicios.push({nombre:'',series:'',reps:'',rir:'',desc:'',var:''});
renderRutinaForm();
}

function eliminarEjercicio(idx){
guardarEjsActuales();
rutinaActual[diaSeleccionado].ejercicios.splice(idx,1);
renderRutinaForm();
}

function cerrarModalRutina(){document.getElementById('modal-rutina').classList.remove('open');}

async function guardarRutina(){
guardarEjsActuales();
const rec=document.getElementById('rec-'+diaSeleccionado);
const rut=document.getElementById('rut-'+diaSeleccionado);
if(rec)rutinaActual[diaSeleccionado]={...rutinaActual[diaSeleccionado],recordatorio:rec.value,rutina:rut?.value||''};
const id=document.getElementById('rutina-cliente-id').value;
await fetch('/api/rutinas/'+id,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(rutinaActual)});
toast('✅ Rutina guardada');cerrarModalRutina();
}

async function cargarFestivos(){
const res=await fetch('/api/festivos');
const festivos=await res.json();
document.getElementById('lista-festivos').innerHTML=festivos.length?festivos.map(f=>`
<div class="fi">
<div><div style="font-weight:700">${f.nombre}</div>
<div style="font-size:12px;color:#666">${f.fecha}</div></div>
<button class="btn bp" style="padding:6px 12px;font-size:12px" onclick="eliminarFestivo('${f.fecha}')">🗑️</button>
</div>`).join(''):'<p style="color:#555;text-align:center;padding:20px">No hay festivos</p>';
}

async function agregarFestivo(){
const fecha=document.getElementById('festivo-fecha').value;
const nombre=document.getElementById('festivo-nombre').value.trim();
if(!fecha||!nombre){toast('Completa los campos',false);return;}
await fetch('/api/festivos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fecha,nombre})});
document.getElementById('festivo-fecha').value='';
document.getElementById('festivo-nombre').value='';
toast('✅ Festivo agregado');cargarFestivos();
}

async function eliminarFestivo(fecha){
await fetch('/api/festivos/'+fecha,{method:'DELETE'});
toast('🗑️ Eliminado');cargarFestivos();
}

async function cargarLogs(){
const res=await fetch('/api/logs');
const logs=await res.json();
const fechas=Object.keys(logs).sort().reverse();
document.getElementById('lista-logs').innerHTML=fechas.length?fechas.map(f=>`
<div class="card">
<div style="font-weight:700;color:var(--rojo);margin-bottom:8px">📅 ${f}</div>
${Object.entries(logs[f]).map(([n,e])=>`
<div class="li"><span>${n}</span>
<span class="${e==='enviado'?'lok':'ler'}">${e==='enviado'?'✅ Enviado':'❌ Error'}</span>
</div>`).join('')}
</div>`).join(''):'<p style="color:#555;text-align:center;padding:20px">Sin historial</p>';
}

async function cargarSelectEnviar(){
const res=await fetch('/api/usuarios');
const usuarios=await res.json();
const opts=usuarios.map(u=>`<option value="${u.id}" data-tel="${u.telefono}">${u.nombre}</option>`).join('');
document.getElementById('enviar-cliente').innerHTML=opts;
document.getElementById('enviar-cliente-dia').innerHTML=opts;
document.getElementById('enviar-cliente2').innerHTML=opts;
}

async function enviarDiaRutina(){
const id=document.getElementById('enviar-cliente-dia').value;
const dia=document.getElementById('enviar-dia-select').value;
if(!id){toast('Selecciona un cliente',false);return;}
const res=await fetch('/api/enviar-dia/'+id,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dia})});
const data=await res.json();
toast(data.ok?'✅ Día enviado':'❌ Error',data.ok);
}

async function enviarRutinaCompleta(){
const id=document.getElementById('enviar-cliente').value;
if(!id){toast('Selecciona un cliente',false);return;}
const res=await fetch('/api/enviar-rutina/'+id,{method:'POST'});
const data=await res.json();
toast(data.ok?'✅ Rutina enviada':'❌ Error',data.ok);
}

async function enviarMensajeCustom(){
const sel=document.getElementById('enviar-cliente2');
const telefono=sel.options[sel.selectedIndex].getAttribute('data-tel');
const mensaje=document.getElementById('mensaje-custom').value.trim();
if(!mensaje){toast('Escribe un mensaje',false);return;}
const res=await fetch('/api/enviar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({telefono,mensaje})});
const data=await res.json();
toast(data.ok?'✅ Enviado':'❌ Error',data.ok);
if(data.ok)document.getElementById('mensaje-custom').value='';
}
